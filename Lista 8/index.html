<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrandBuzz</title>

    <link rel="stylesheet" href="/style.css">

    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>

    <header>

        <div class="logo">
            <img src="https://github.com/pw1etec/brand-buz/blob/main/assets/images/logo.png?raw=true" alt="BrandBuzz">
        </div>

        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About Us</a></li>
                <li><a href="#">Service</a></li>
                <li><a href="#">Contact Us</a></li>
                <li><a href="#">Blog</a></li>
            </ul>
        </nav>

        <button class="btn-signup">
            Sign Up
        </button>

    </header>

    <section class="hero">

        <img src="https://github.com/pw1etec/brand-buz/blob/main/assets/images/bg.png?raw=true"
             alt=""
             class="decoracao">

        <div class="hero-content">

            <div class="hero-text">

                <h1>
                    We create
                    <span>solutions</span>
                    for your business
                </h1>

                <p>
                    Our team keeps a keen eye on emerging trends
                    and technologies to ensure your marketing
                    campaigns remain cutting-edge.
                </p>

                <button class="btn-start">
                    Get Started
                </button>

                <a href="#" class="explore">

                    <i class="fa-solid fa-play" style="color:#e85f19;"></i>

                    Explore More
                </a>

            </div>

            <div class="hero-image">
                <img src="https://github.com/pw1etec/brand-buz/blob/main/assets/images/banner.png?raw=true"
                     alt="Business Illustration">
            </div>

        </div>

    </section>

</body>
</html>
